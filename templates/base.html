<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LauraDerma Marketplace{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .wishlist-btn svg {
            transition: all 0.3s ease;
            fill: transparent;
            stroke: currentColor;
        }
        /* Warna Merah untuk Like */
        .wishlist-btn.active svg {
            fill: #8C7454 !important;  /* Mengisi warna cokelat di dalam ikon */
            stroke: #8C7454 !important; /* Mengubah warna garis pinggir menjadi cokelat */
        }

        /* Aturan saat produk sudah di-like (setelah refresh halaman) */
        .like-btn.active svg {
            fill: #ef4444 !important;  /* Mengisi warna merah di dalam ikon love */
            stroke: #ef4444 !important; /* Mengubah garis pinggir love menjadi merah */
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #fbbf24;
        }

        /* Scrollbar Tipis untuk Daftar Review */
        .scrollbar-thin::-webkit-scrollbar {
            width: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #8C7454;
            border-radius: 10px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down {
            animation: fadeInDown 0.5s ease-out;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-[#FAF8F5] text-[#2C2A29] flex flex-col min-h-screen">

    {% include 'partials/navbar.html' %}

    {% if messages %}
    <div class="max-w-7xl mx-auto w-full px-4 mt-4">
        {% for message in messages %}
        <div class="p-4 mb-2 text-sm rounded-xl {% if message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% else %}bg-amber-100 text-amber-800 border border-amber-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    {% block extra_js %}{% endblock %}

    <script>
        function toggleWishlist(btn, produkId) {
            // 1. Mencegah event klik tembus ke elemen induk (seperti link detail produk)
            if (window.event) window.event.stopPropagation();

            // 2. Proteksi Login (Hanya jalan jika skrip ini ada di dalam file .html)
            {% if not request.user.is_authenticated %}
                if (typeof openLoginModal === "function") {
                    openLoginModal();
                } else {
                    alert("Silakan login terlebih dahulu");
                }
                return;
            {% endif %}

            fetch(`/produk/wishlist/${produkId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Gagal memproses data');
            })
            .then(data => {
                const badge = document.getElementById('wishlist-badge');

                if (data.status === 'added') {
                    btn.classList.add('active');
                    // Update Badge
                    if (badge) {
                        let currentCount = parseInt(badge.innerText) || 0;
                        badge.innerText = currentCount + 1;
                        badge.classList.remove('hidden');
                    }
                } 
                else if (data.status === 'removed') {
                    btn.classList.remove('active');
                    
                    // Update Badge
                    if (badge) {
                        let currentCount = parseInt(badge.innerText) || 0;
                        let newCount = Math.max(0, currentCount - 1);
                        badge.innerText = newCount;
                        if (newCount === 0) badge.classList.add('hidden');
                    }

                    // --- LOGIKA KHUSUS HALAMAN WISHLIST ---
                    // Kita cek apakah kita sedang di halaman wishlist
                    if (window.location.pathname.includes('wishlist')) {
                        // Mencari element kartu terdekat dengan class .product-card atau .group
                        const card = btn.closest('.product-card') || btn.closest('.group'); 
                        
                        if (card) {
                            card.style.transition = 'all 0.4s ease';
                            card.style.opacity = '0';
                            card.style.transform = 'scale(0.9)';
                            
                            setTimeout(() => {
                                card.remove();
                                
                                // Cek apakah grid sudah kosong
                                const grid = document.getElementById('wishlist-grid') || document.querySelector('.grid'); 
                                // Jika tidak ada kartu lagi di dalam grid, reload halaman
                                if (grid && grid.querySelectorAll('.product-card, .group').length === 0) {
                                    window.location.reload();
                                }
                            }, 400);
                        }
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function toggleLike(btn, produkId) {
            if (window.event) window.event.stopPropagation();

            {% if not request.user.is_authenticated %}
                openLoginModal();
                return;
            {% endif %}

            fetch(`/produk/like/${produkId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                const badge = document.getElementById('like-badge'); // Pastikan ID ini ada di navbar

                if (data.status === 'liked') {
                    btn.classList.add('active');
                    if(badge) {
                        let count = parseInt(badge.innerText) || 0;
                        badge.innerText = count + 1;
                        badge.classList.remove('hidden');
                    }
                } else {
                    btn.classList.remove('active');
                    if(badge) {
                        let count = parseInt(badge.innerText) || 0;
                        let newCount = Math.max(0, count - 1);
                        badge.innerText = newCount;
                        if(newCount === 0) badge.classList.add('hidden');
                    }

                    // Logika hapus kartu jika di halaman favorit
                    if (window.location.pathname.includes('favorit')) {
                        const card = btn.closest('.product-card');
                        if (card) {
                            card.style.opacity = '0';
                            setTimeout(() => {
                                card.remove();
                                const grid = document.getElementById('likes-grid');
                                if (grid && grid.querySelectorAll('.product-card').length === 0) {
                                    window.location.reload();
                                }
                            }, 300);
                        }
                    }
                }
            });
        }

        function changeImage(url, element) {
            const mainImage = document.getElementById('main-image');
            
            // Animasi fade out
            mainImage.style.opacity = '0';
            
            setTimeout(() => {
                mainImage.src = url;
                mainImage.style.opacity = '1';
            }, 200);

            // Update border thumbnail
            document.querySelectorAll('.thumbnail-item').forEach(item => {
                item.classList.remove('border-[#8C7454]');
                item.classList.add('border-transparent');
            });
            element.classList.remove('border-transparent');
            element.classList.add('border-[#8C7454]');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const galeriInput = document.getElementById('galeri_input');
            const container = document.getElementById('galeri-preview-container');

            // Pastikan elemennya ada sebelum memasang listener
            if (galeriInput && container) {
                galeriInput.addEventListener('change', function(e) {
                    container.innerHTML = ''; 
                    
                    Array.from(e.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const div = document.createElement('div');
                            div.className = 'relative w-12 h-12 rounded-md overflow-hidden border border-[#EAE3D2] shadow-sm';
                            div.innerHTML = `<img src="${event.target.result}" class="w-full h-full object-cover">`;
                            container.appendChild(div);
                        }
                        reader.readAsDataURL(file);
                    });
                });
            }
        });

        document.getElementById('reviewForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman

            const form = this;
            const formData = new FormData(form);
            const container = document.getElementById('reviewContainer');

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    const container = document.getElementById('reviewContainer');
                    const wrapper = document.getElementById('review-section-wrapper');
                    
                    // 1. Buat HTML untuk ulasan baru
                    const newReview = `
                        <div class="bg-white border border-stone-100 p-6 rounded-2xl shadow-sm transition-all animate-fade-in-down">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-[#8C7454] flex items-center justify-center text-white font-bold text-sm">
                                        ${data.avatar}
                                    </div>
                                    <div>
                                        <p class="font-semibold text-stone-900 text-sm">${data.username}</p>
                                        <p class="text-[10px] text-stone-400 uppercase tracking-tighter">${data.tanggal}</p>
                                    </div>
                                </div>
                                <div class="flex text-yellow-400">
                                    ${Array.from({length: 5}, (_, i) => `
                                        <svg class="w-3.5 h-3.5 ${i < data.rating ? 'fill-current' : 'text-stone-200'}" viewBox="0 0 20 20">
                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                        </svg>
                                    `).join('')}
                                </div>
                            </div>
                            <p class="text-stone-600 text-sm italic leading-relaxed">"${data.komentar}"</p>
                        </div>
                    `;

                    // 2. Masukkan ke daftar review
                    if (container) {
                        const noReview = document.getElementById('no-review') || container.querySelector('.text-center.py-20');
                        if (noReview) noReview.remove();
                        container.insertAdjacentHTML('afterbegin', newReview);
                    }

                    // 3. Ganti form dengan pesan sukses
                    if (wrapper) {
                        wrapper.innerHTML = `
                            <div class="p-8 bg-green-50 rounded-3xl border border-green-100 text-center animate-fade-in-down">
                                <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-white">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                                <h4 class="text-green-800 font-semibold mb-1">Terima Kasih!</h4>
                                <p class="text-green-600 text-sm">Anda telah memberikan ulasan untuk produk ini.</p>
                            </div>
                        `;
                    }
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Terjadi kesalahan sistem.");
            });
        });
    </script>
</body>
</html>
