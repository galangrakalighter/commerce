<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LauraDerma Marketplace{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-font { font-family: 'Playfair Display', serif; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-[#FAF8F5] text-[#2C2A29] flex flex-col min-h-screen">

    {% include 'partials/navbar.html' %}

    {% if messages %}
    <div class="max-w-7xl mx-auto w-full px-4 mt-4">
        {% for message in messages %}
        <div class="p-4 mb-2 text-sm rounded-xl {% if message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% else %}bg-amber-100 text-amber-800 border border-amber-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    {% block extra_js %}{% endblock %}
</body>
</html>
