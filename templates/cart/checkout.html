{% extends 'base.html' %}

{% block content %}
<div class="bg-[#FAF8F5] min-h-screen py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white p-8 rounded-3xl border border-stone-100 shadow-sm">
            <h2 class="text-2xl font-serif text-stone-900 mb-6">Informasi Pengiriman</h2>
            
            {% if error_api %}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-xs font-medium mb-4">
                ❌ {{ error_api }}
            </div>
            {% endif %}
            
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-medium text-stone-700 mb-1">Nama Penerima</label>
                    <input type="text" name="nama_penerima" required class="w-full bg-[#FAF8F5] border border-[#EAE3D2] rounded-xl py-2 px-4 text-sm outline-none focus:border-[#8C7454]">
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-700 mb-1">Nomor Telepon/WhatsApp</label>
                    <input type="text" name="telepon" required class="w-full bg-[#FAF8F5] border border-[#EAE3D2] rounded-xl py-2 px-4 text-sm outline-none focus:border-[#8C7454]">
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-700 mb-1">Alamat Lengkap</label>
                    <textarea name="alamat_lengkap" rows="4" required class="w-full bg-[#FAF8F5] border border-[#EAE3D2] rounded-xl py-2 px-4 text-sm outline-none focus:border-[#8C7454]"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-700 mb-1">Catatan Tambahan (Opsional)</label>
                    <input type="text" name="catatan" class="w-full bg-[#FAF8F5] border border-[#EAE3D2] rounded-xl py-2 px-4 text-sm outline-none focus:border-[#8C7454]">
                </div>
                
                <div class="border-t border-stone-100 pt-4 mt-6 flex justify-between items-center">
                    <div>
                        <span class="text-xs text-stone-400 block">Total yang harus dibayar:</span>
                        <span class="text-xl font-bold text-[#8C7454]">Rp {{ total_belanja }}</span>
                    </div>
                    <button type="submit" class="bg-[#8C7454] text-white px-8 py-3 rounded-full text-sm font-medium hover:bg-[#735F43] transition-colors shadow-md cursor-pointer">
                        Proses Pembayaran
                    </button>
                </div>
            </form>
            
            <a href="{% url 'home' %}" class="block text-center text-xs text-stone-400 mt-4 hover:underline">
                Kembali Belanja
            </a>
        </div>
    </div>
</div>
{% endblock %}
