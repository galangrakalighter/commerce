{% extends 'shop/list.html' %} {% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="glass-card p-8 rounded-3xl w-full max-w-md border border-slate-800">
        <h2 class="text-3xl font-black mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 uppercase">System Login</h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                {{ form.as_p }}
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-600/20">
                AUTHORIZE ACCESS
            </button>
        </form>
        
        <p class="mt-6 text-center text-slate-500 text-xs">
            New operator? <a href="{% url 'register' %}" class="text-blue-400 hover:underline">Register Device</a>
        </p>
    </div>
</div>
{% endblock %}
