<div class="mt-2 space-y-4">
    {% if widget.is_initial %}
        <div class="flex items-center gap-5 p-4 bg-gray-50 border border-gray-100 shadow-sm">
            <div class="relative w-20 h-20 overflow-hidden border border-gray-200">
                <img src="{{ widget.value.url }}" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[8px] uppercase tracking-[0.3em] text-gold font-bold">Current Identity</span>
                <p class="text-[10px] text-gray-500 truncate max-w-[150px] italic">{{ widget.value.name }}</p>
                
                {% if not widget.required %}
                <label class="flex items-center gap-2 mt-2 cursor-pointer group">
                    <input type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}" class="w-3 h-3 accent-red-500">
                    <span class="text-[9px] uppercase tracking-widest text-red-400 group-hover:text-red-600 transition">Remove Image</span>
                </label>
                {% endif %}
            </div>
        </div>
    {% endif %}

    <div class="relative mt-2">
        <input type="{{ widget.type }}" name="{{ widget.name }}" {% include "django/forms/widgets/attrs.html" %} 
               class="block w-full text-[10px] text-gray-400
                      file:mr-4 file:py-2 file:px-6
                      file:border-0 file:text-[9px] file:font-bold
                      file:uppercase file:tracking-[0.2em]
                      file:bg-[#1a1a1a] file:text-white
                      hover:file:bg-gold transition-all cursor-pointer">
    </div>
</div>
