<div x-show="loginModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-white/90 backdrop-blur-sm">
    <div @click.away="loginModal = false" class="bg-white w-full max-w-md p-12 border border-gray-100 shadow-2xl relative">
        <button @click="loginModal = false" class="absolute top-6 right-6 text-gray-300 hover:text-gold">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
        
        <div class="flex justify-center gap-8 mb-12">
            <button @click="authTab = 'login'" :class="authTab === 'login' ? 'text-gold border-b-2 border-gold' : 'text-gray-300'" class="pb-2 text-[11px] uppercase tracking-widest font-bold">Login</button>
            <button @click="authTab = 'register'" :class="authTab === 'register' ? 'text-gold border-b-2 border-gold' : 'text-gray-300'" class="pb-2 text-[11px] uppercase tracking-widest font-bold">Register</button>
        </div>

        <form x-show="authTab === 'login'" action="/accounts/login/" method="POST" class="space-y-6">
            {% csrf_token %}
            <input type="text" name="username" placeholder="USERNAME" required class="w-full border-b border-gray-200 py-3 focus:border-gold focus:outline-none text-xs tracking-widest">
            <input type="password" name="password" placeholder="PASSWORD" required class="w-full border-b border-gray-200 py-3 focus:border-gold focus:outline-none text-xs tracking-widest">
            <button type="submit" class="w-full btn-gold py-4 text-[10px] font-bold uppercase tracking-widest">Sign In</button>
        </form>

        <form x-show="authTab === 'register'" action="{% url 'shop:register' %}" method="POST" class="space-y-6" x-cloak>
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="USERNAME" required 
                class="w-full border-b border-gray-200 py-3 focus:border-gold focus:outline-none text-xs tracking-widest uppercase">
            
            <input type="password" name="password1" placeholder="PASSWORD" required 
                class="w-full border-b border-gray-200 py-3 focus:border-gold focus:outline-none text-xs tracking-widest">
            
            <input type="password" name="password2" placeholder="CONFIRM PASSWORD" required 
                class="w-full border-b border-gray-200 py-3 focus:border-gold focus:outline-none text-xs tracking-widest">
            
            <button type="submit" class="w-full btn-gold py-4 text-[10px] font-bold uppercase tracking-widest shadow-lg hover:shadow-gold/20 transition-all">
                Create Identity
            </button>
        </form>
    </div>
</div>
