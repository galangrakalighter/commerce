<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMG Luxury | Skin & Beauty{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a;
        }

        h1, h2, h3, .font-serif { 
            font-family: 'Cormorant Garamond', serif; 
        }

        .bg-luxury { background-color: #fcfbf7; }
        .btn-gold { background-color: #c5a358; color: white; }
        .btn-gold:hover { background-color: #b08e46; }
        .text-gold { color: #c5a358; }
        .border-gold { border-color: #e5d5b5; }

        [x-cloak] { display: none !important; }
    </style>
</head>

<body x-data="{ loginModal: false, authTab: 'login', cartCount: {{ cart|length }} }" @update-cart.window="cartCount = $event.detail.newCount">

    <div class="bg-[#1a1a1a] text-white text-[10px] py-2 text-center uppercase tracking-[0.2em]">
        Free Shipping for LMG Members • Luxury Experience
    </div>

    {% include "shop/includes/navbar.html" %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <a href="{% url 'shop:cart_detail' %}" class="fixed bottom-8 right-8 z-[90] group">
        <div x-show="cartCount > 0" 
            x-text="cartCount" 
            class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-white shadow-lg animate-bounce group-hover:animate-none"
            x-cloak>
        </div>
        
        <div class="bg-[#1a1a1a] text-white p-5 rounded-full shadow-2xl transition-all group-hover:bg-gold group-hover:scale-110">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
        </div>
    </a>

    {% include "shop/includes/auth_modal.html" %} <script>
        lucide.createIcons();

        function addToCart(url) {
            fetch(url, {
                method: 'GET',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'ok') {
                    const event = new CustomEvent('update-cart', { 
                        detail: { newCount: data.cart_count } 
                    });
                    window.dispatchEvent(event);
                }
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
