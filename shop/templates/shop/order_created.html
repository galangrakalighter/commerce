{% extends "shop/base.html" %}

{% block content %}
<div class="container mx-auto px-6 py-32 text-center">
    <div class="mb-8 flex justify-center">
        <div class="p-6 bg-green-50 rounded-full">
            <i data-lucide="check-circle" class="w-16 h-16 text-green-500 stroke-[1]"></i>
        </div>
    </div>
    <h1 class="text-4xl font-serif mb-4">Order Placed Successfully</h1>
    <p class="text-gray-500 mb-10 text-sm">Your order number is <span class="font-bold text-gray-800">#LMG-{{ order.id }}</span>. <br> We will send a confirmation email shortly.</p>
    
    <a href="{% url 'shop:product_list' %}" class="btn-gold px-12 py-4 rounded-full text-[10px] uppercase tracking-widest inline-block transition-all">
        Back to Gallery
    </a>
</div>

<script>lucide.createIcons();</script>
{% endblock %}
